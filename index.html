<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宋代诗人关系星云 · 诗云星图</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000011; color: #fff; overflow: hidden; height: 100vh; width: 100vw; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; position: fixed; }
        
        /* 顶部导航 */
        .header { position: fixed; top: 0; left: 0; right: 0; height: 56px; background: linear-gradient(180deg, rgba(0,0,30,0.95) 0%, rgba(0,0,30,0.8) 100%); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; z-index: 100; border-bottom: 1px solid rgba(100,150,255,0.2); }
        .header h1 { font-size: 16px; font-weight: 600; background: linear-gradient(90deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; white-space: nowrap; }
        .header-controls { display: flex; gap: 10px; align-items: center; }
        
        /* 搜索框 */
        .search-box { position: relative; }
        .search-box input { width: 120px; padding: 6px 12px; background: rgba(255,255,255,0.1); border: 1px solid rgba(100,150,255,0.3); border-radius: 16px; color: #fff; font-size: 13px; outline: none; transition: all 0.3s; }
        .search-box input:focus { width: 160px; background: rgba(255,255,255,0.15); border-color: #60a5fa; }
        .search-box input::placeholder { color: rgba(255,255,255,0.5); }
        
        /* 朝代切换 */
        .dynasty-toggle { display: flex; background: rgba(255,255,255,0.1); border-radius: 16px; padding: 3px; gap: 3px; }
        .dynasty-btn { padding: 5px 12px; border: none; border-radius: 13px; background: transparent; color: rgba(255,255,255,0.6); font-size: 12px; cursor: pointer; transition: all 0.3s; -webkit-tap-highlight-color: transparent; }
        .dynasty-btn.active { background: linear-gradient(90deg, #60a5fa, #3b82f6); color: #fff; box-shadow: 0 0 10px rgba(96,165,250,0.4); }
        
        /* 底部控制栏 */
        .controls { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 100; flex-wrap: wrap; justify-content: center; max-width: 95%; padding: 0 8px; }
        .control-btn { padding: 8px 14px; background: rgba(255,255,255,0.1); border: 1px solid rgba(100,150,255,0.3); border-radius: 20px; color: #fff; font-size: 12px; cursor: pointer; transition: all 0.3s; backdrop-filter: blur(10px); -webkit-tap-highlight-color: transparent; }
        .control-btn:active { transform: scale(0.95); }
        .control-btn.active { background: linear-gradient(90deg, #60a5fa, #3b82f6); border-color: #60a5fa; }
        
        /* 图例面板 */
        .legend { position: fixed; bottom: 80px; left: 12px; background: rgba(0,0,30,0.9); backdrop-filter: blur(10px); border: 1px solid rgba(100,150,255,0.2); border-radius: 10px; padding: 12px; z-index: 100; max-height: 280px; overflow-y: auto; min-width: 140px; max-width: 180px; -webkit-overflow-scrolling: touch; }
        .legend h3 { font-size: 12px; margin-bottom: 10px; color: #60a5fa; font-weight: 600; }
        .legend-item { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 11px; }
        .legend-item:last-child { border-bottom: none; }
        .legend-name { display: flex; align-items: center; gap: 6px; overflow: hidden; }
        .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 6px currentColor; }
        .legend-name span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .legend-count { color: rgba(255,255,255,0.5); font-size: 10px; flex-shrink: 0; }
        
        /* 3D 容器 */
        #graph { width: 100vw; height: 100vh; position: relative; }
        
        /* 加载动画 */
        .loading { position: fixed; inset: 0; background: #000011; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; transition: opacity 0.5s; }
        .loading.hidden { opacity: 0; pointer-events: none; }
        .spinner { width: 50px; height: 50px; border: 3px solid rgba(96,165,250,0.2); border-top-color: #60a5fa; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { margin-top: 16px; color: #60a5fa; font-size: 13px; }
        .loading-hint { margin-top: 10px; color: rgba(255,255,255,0.5); font-size: 11px; text-align: center; }
        .debug { margin-top: 8px; color: rgba(255,255,255,0.4); font-size: 10px; font-family: monospace; }
        
        /* 提示框 */
        .tooltip { position: absolute; background: rgba(0,0,30,0.95); border: 1px solid rgba(100,150,255,0.4); border-radius: 8px; padding: 10px 14px; font-size: 12px; pointer-events: none; z-index: 1000; max-width: 250px; display: none; backdrop-filter: blur(10px); }
        .tooltip h4 { color: #60a5fa; margin-bottom: 6px; font-size: 14px; }
        .tooltip p { color: rgba(255,255,255,0.8); line-height: 1.4; }
        
        /* 移动端优化 */
        @media (max-width: 480px) {
            .header h1 { font-size: 14px; }
            .search-box input { width: 100px; font-size: 12px; }
            .search-box input:focus { width: 130px; }
            .dynasty-btn { padding: 4px 10px; font-size: 11px; }
            .control-btn { padding: 6px 12px; font-size: 11px; }
            .legend { bottom: 70px; font-size: 10px; max-width: 160px; }
        }
    </style>
</head>
<body>
    <!-- 加载动画 -->

    <!-- 3D 图 -->

    <!-- 底部控制 -->

    <!-- 图例 -->

        // 唐代诗人数据

                return;
            }

                nodeRes: isMobile ? 10 : 16,
                particles: isMobile ? 1 : 2,
                particleSpeed: isMobile ? 0.004 : 0.006,
                charge: isMobile ? -120 : -180,
                distance: isMobile ? 90 : 120,
                rotateSpeed: isMobile ? 0.4 : 0.6,
                nodeSize: isMobile ? 0.8 : 1
            };

            try {
                console.log('创建 ForceGraph3D 实例...');
                Graph = ForceGraph3D()(document.getElementById('graph'))
                    .graphData(currentData)
                    .nodeLabel('id')
                    .nodeAutoColorBy('group')
                    .nodeResolution(cfg.nodeRes)
                    .nodeThreeObjectExtend(true)
                    .nodeThreeObject(node => {
                        const size = (node.val / 15) * cfg.nodeSize;
                        const geometry = new THREE.SphereGeometry(size, cfg.nodeRes, cfg.nodeRes);
                        const material = new THREE.MeshPhongMaterial({
                            color: node.color,
                            emissive: node.color,
                            emissiveIntensity: 0.6,
                            transparent: true,
                            opacity: 0.95
                        });
                        const mesh = new THREE.Mesh(geometry, material);
                        
                        if (isBloom && !isMobile) {
                            const glowGeo = new THREE.SphereGeometry(size * 1.3, 8, 8);
                            const glowMat = new THREE.MeshBasicMaterial({
                                color: node.color,
                                transparent: true,
                                opacity: 0.25,
                                side: THREE.BackSide
                            });
                            mesh.add(new THREE.Mesh(glowGeo, glowMat));
                        }
                        return mesh;
                    })
                    .linkWidth(link => Math.sqrt(link.value) * (isMobile ? 0.7 : 1))
                    .linkOpacity(isMobile ? 0.5 : 0.7)
                    .linkColor(link => {
                        const srcColor = link.source.color;
                        const tgtColor = link.target.color;
                        return `linear-gradient(${srcColor}, ${tgtColor})`;
                    })
                    .linkDirectionalParticles(isParticles ? cfg.particles : 0)
                    .linkDirectionalParticleSpeed(cfg.particleSpeed)
                    .linkDirectionalParticleColor(() => '#60a5fa')
                    .linkDirectionalParticleWidth(isMobile ? 1.5 : 2)
                    .d3Force('charge', d3.forceManyBody().strength(cfg.charge))
                    .d3Force('link', d3.forceLink().distance(cfg.distance))
                    .d3Force('collide', d3.forceCollide().radius(node => (node.val / 15) * cfg.nodeSize * 2.5))
                    .backgroundColor('#000011')
                    .showNavInfo(false)
                    .onNodeHover(node => {
                        document.getElementById('graph').style.cursor = node ? 'pointer' : 'default';
                        showTooltip(node);
                    })
                    .onNodeClick(node => {
                        Graph.cameraPosition(
                            { x: node.x * 1.5, y: node.y * 1.5, z: node.z * 1.5 },
                            { x: node.x, y: node.y, z: node.z },
                            isMobile ? 1500 : 2000
                        );
                    })
                    .onEngineStop(() => {
                        console.log('✅ 引擎停止，渲染完成');
                        document.getElementById('loading').classList.add('hidden');
                    })
                    .onBackgroundClick(() => {
                        console.log('背景点击');
                    });
                
                console.log('✅ Graph 对象创建成功');
                console.log('Graph 方法:', Object.keys(Graph).slice(0, 10));

                // 控制器配置
                const controls = Graph.controls();
                controls.autoRotate = isRotating;
                controls.autoRotateSpeed = cfg.rotateSpeed;
                controls.enableDamping = true;
                controls.dampingFactor = 0.05;
                
                // 移动端优化
                if (isMobile) {
                    controls.rotateSpeed = 1.8;
                    controls.zoomSpeed = 1.5;
                    controls.panSpeed = 1.5;
                    controls.enablePan = true;
                }

                document.getElementById('debug').textContent += ' | 图表：✅';
            } catch (err) {
                console.error('❌ 3D 初始化错误:', err);
                console.error('错误堆栈:', err.stack);
                
                // 尝试切换到 2D 模式
                try {
                    show2DGraph();
                    document.getElementById('loading').classList.add('hidden');
                    return;
                } catch (e2d) {
                    console.error('2D 模式也失败:', e2d);
                }
                
                document.getElementById('loading').innerHTML = `
                    <div style="text-align:center;padding:40px;max-width:400px;">
                        <h2 style="color:#ef4444;margin-bottom:20px;">❌ 渲染失败</h2>
                        <p style="color:#fff;margin-bottom:10px;">${err.message}</p>
                        <p style="color:rgba(255,255,255,0.5);font-size:11px;margin-bottom:20px;word-break:break-all;">${err.stack || ''}</p>
                        <p style="color:rgba(255,255,255,0.6);font-size:12px;margin-bottom:20px;">请尝试：</p>
                        <ul style="text-align:left;color:rgba(255,255,255,0.7);font-size:12px;line-height:1.8;margin-bottom:20px;">
                            <li>• 刷新页面重试</li>
                            <li>• 更换 Chrome/Safari 浏览器</li>
                            <li>• 检查浏览器是否支持 WebGL</li>
                        </ul>
                        <button onclick="location.reload()" style="padding:12px 30px;background:#60a5fa;border:none;border-radius:8px;color:#fff;font-size:16px;cursor:pointer;">🔄 刷新重试</button>
                        <p style="color:rgba(255,255,255,0.4);font-size:11px;margin-top:15px;">如多次失败，请截图发给我</p>
                    </div>
                `;
            }

            // 超时保护
            setTimeout(() => {
                const loading = document.getElementById('loading');
                if (loading && !loading.classList.contains('hidden')) {
                    console.log('⏰ 超时强制显示');
                    loading.classList.add('hidden');
                }
            }, 8000);
        }

        // ==================== 2D 降级模式 ====================
        function show2DGraph() {
            console.log('🔄 切换到 2D 模式');
            document.getElementById('graph-2d').style.display = 'block';
            
            const svg = document.getElementById('svg-2d');
            const width = window.innerWidth;
            const height = window.innerHeight;
            const centerX = width / 2;
            const centerY = height / 2;
            
            // 简单的力导向布局模拟
            const nodes = currentData.nodes.map(n => ({
                ...n,
                x: centerX + (Math.random() - 0.5) * 400,
                y: centerY + (Math.random() - 0.5) * 400,
                vx: 0,
                vy: 0
            }));
            
            let svgContent = `<svg viewBox="0 0 ${width} ${height}" xmlns="http://www.w3.org/2000/svg">`;
            
            // 绘制连线
            currentData.links.forEach(link => {
                const src = nodes.find(n => n.id === link.source);
                const tgt = nodes.find(n => n.id === link.target);
                if (src && tgt) {
                    svgContent += `<line x1="${src.x}" y1="${src.y}" x2="${tgt.x}" y2="${tgt.y}" stroke="${src.color}" stroke-width="${Math.sqrt(link.value) * 0.5}" opacity="0.4"/>`;
                }
            });
            
            // 绘制节点
            nodes.forEach(node => {
                const r = Math.max(4, Math.min(node.val / 10, 25));
                svgContent += `<circle cx="${node.x}" cy="${node.y}" r="${r}" fill="${node.color}" opacity="0.8"><title>${node.id} (${node.val})</title></circle>`;
                svgContent += `<text x="${node.x}" y="${node.y - r - 2}" text-anchor="middle" fill="#fff" font-size="10">${node.id}</text>`;
            });
            
            svgContent += '</svg>';
            svg.innerHTML = svgContent;
        }

        // ==================== 工具函数 ====================
        function showTooltip(node) {
            const tooltip = document.getElementById('tooltip');
            if (node) {
                tooltip.style.display = 'block';
                tooltip.innerHTML = `
                    <h4>${node.id}</h4>
                    <p style="color:rgba(255,255,255,0.7);font-size:11px;margin-bottom:6px;">${node.desc || ''}</p>
                    <p>影响力：<strong style="color:#60a5fa">${node.val}</strong></p>
                    <p style="font-size:11px;color:rgba(255,255,255,0.5);">点击可聚焦查看</p>
                `;
                
                const moveHandler = e => {
                    const x = e.clientX || (e.touches && e.touches[0].clientX);
                    const y = e.clientY || (e.touches && e.touches[0].clientY);
                    if (x && y) {
                        tooltip.style.left = (x + 15) + 'px';
                        tooltip.style.top = (y + 15) + 'px';
                    }
                };
                
                document.addEventListener('mousemove', moveHandler);
                document.addEventListener('touchmove', moveHandler);
                
                tooltip.onmouseleave = () => {
                    tooltip.style.display = 'none';
                    document.removeEventListener('mousemove', moveHandler);
                    document.removeEventListener('touchmove', moveHandler);
                };
            } else {
                tooltip.style.display = 'none';
            }
        }

        function updateLegend(data) {
            const top = data.nodes.sort((a, b) => b.val - a.val).slice(0, 12);
            document.getElementById('legend-content').innerHTML = top.map(p => `
                <div class="legend-item">
                    <div class="legend-name">
                        <div class="legend-dot" style="background:${p.color};color:${p.color}"></div>
                        <span>${p.id}</span>
                    </div>
                    <div class="legend-count">${p.val}</div>
                </div>
            `).join('');
        }

        // ==================== 事件绑定 ====================
        function bindEvents() {
            // 搜索
            document.getElementById('search').addEventListener('input', e => {
                const q = e.target.value.trim();
                if (q && Graph) {
                    const node = currentData.nodes.find(n => n.id.includes(q));
                    if (node) {
                        Graph.cameraPosition(
                            { x: node.x * 2, y: node.y * 2, z: node.z * 2 },
                            { x: node.x, y: node.y, z: node.z },
                            1500
                        );
                        // 高亮
                        const origColor = node.color;
                        Graph.nodeColor(n => n === node ? '#ffffff' : n.color);
                        setTimeout(() => Graph.nodeColor(n => n.color), 2000);
                    }
                }
            });

            // 朝代切换
            document.querySelectorAll('.dynasty-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.dynasty-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentData = btn.dataset.dynasty === 'song' ? songData : tangData;
                    Graph.graphData(currentData);
                    updateLegend(currentData);
                });
            });

            // 旋转控制
            document.getElementById('btn-rotate').addEventListener('click', e => {
                isRotating = !isRotating;
                Graph.controls().autoRotate = isRotating;
                e.target.textContent = isRotating ? '🔄 停止旋转' : '▶️ 旋转';
                e.target.classList.toggle('active', !isRotating);
            });

            // 翻转
            document.getElementById('btn-flip').addEventListener('click', e => {
                const cam = Graph.cameraPosition();
                Graph.cameraPosition({ x: cam.x, y: -cam.y, z: cam.z }, { x: 0, y: 0, z: 0 }, 1000);
                e.target.classList.toggle('active');
            });

            // 光晕
            document.getElementById('btn-bloom').addEventListener('click', e => {
                isBloom = !isBloom;
                e.target.classList.toggle('active', !isBloom);
            });

            // 粒子
            document.getElementById('btn-particles').addEventListener('click', e => {
                isParticles = !isParticles;
                Graph.linkDirectionalParticles(isParticles ? (isMobile ? 1 : 2) : 0);
                e.target.classList.toggle('active', !isParticles);
            });
        }
    </script>
</body>
</html>
